<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>图片展示</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      background: #f9f9f9;
    }
    img {
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-top: 16px;
    }
    .tip {
      color: #666;
      font-size: 14px;
      margin: 12px 0 24px 0;
    }
  </style>
</head>
<body>
  <h1>我放了一张图片</h1>
  <div class="tip">（点击页面以开启音乐）</div>
  <img src="yiyong.jpg" width="300" alt="一张纪念图片">

  <!-- 隐藏的自动播放音频（静音，不显示控件） -->
  <audio id="bgm" src="off-the-hook.mp3" autoplay hidden muted></audio>

  <script>
    // 第一次用户点击页面时，解除静音开始有声播放
    document.addEventListener('click', function () {
      const audio = document.getElementById('bgm');
      audio.muted = false;
      audio.play();
    }, { once: true });
  </script>
</body>
</html>
